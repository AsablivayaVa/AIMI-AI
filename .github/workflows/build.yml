name: Build AIMI-AI APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: Model_AI_AIMI 

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      # Меняем assembleRelease на assembleDebug, чтобы обойти ошибку проверки ресурсов
      - name: Build APK
        run: ./gradlew assembleDebug

      # Корректируем путь, так как отладочный APK компилируется в другую папку
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AIMI-AI-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
